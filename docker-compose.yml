# docker-compose.yml
version: '3'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: odoo
  odoo:
    image: odoo:17
    ports:
      - "8069:8069"
    depends_on: [db]
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo